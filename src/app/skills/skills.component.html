<app-navbar></app-navbar>
<div class="page-wrapper">
  <section id="skills" class="skills-section" #sectionRef [class.visible]="visible">
    <div class="content">

      <div class="section-header">
        <h2 class="section-title">MY STACK</h2>
        <p class="section-subtitle">What I ship with</p>
      </div>

      <div class="second-row">
        <div class="second-row-wrapper" *ngFor="let row of skillRows; let ri = index" [style.--i]="ri">
          <h3 class="shelf-label">{{ row.label }}</h3>
          <div class="second-row-track">
            <div class="skill-card" *ngFor="let skill of row.skills; let i = index" [style.--i]="i">
              <span *ngIf="skill.topPick" class="top-pick-badge">TOP PICK</span>
              <div class="skill-icon">
                <!-- <span class="skill-initials">{{ getInitials(skill.name) }}</span> -->
                <img [src]="skill.icon" [alt]="skill.name" class="skill-logo" />
              </div>
              <span class="skill-name">{{ skill.name }}</span>
              <div class="skill-bar-track">
                <div class="skill-bar-fill" [style.--proficiency]="skill.proficiency + '%'"></div>
              </div>
              <span class="skill-pct">{{ skill.proficiency }}%</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>
</div>
<app-footer></app-footer>
